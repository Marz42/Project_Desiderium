services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-desiderium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-desiderium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-desiderium} -d ${POSTGRES_DB:-desiderium}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-desiderium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-desiderium}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-desiderium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-desiderium}
      ENVIRONMENT: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips "*"
    expose:
      - "8000"
    networks:
      - internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-desiderium}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-desiderium}
      ENVIRONMENT: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: python -m app.worker
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required for HTTPS}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - internal

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - backup
    env_file:
      - .env
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-desiderium}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-desiderium}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        chmod +x /backup.sh
        while true; do
          /backup.sh
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
