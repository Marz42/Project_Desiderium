# Trend discovery algorithm parameters (Stage 3).
# All thresholds live here — services must not hardcode scoring constants.
version: "1.2"

scoring:
  channel_resonance_weight: 0.35
  relative_breakout_weight: 0.25
  momentum_weight: 0.20
  persistence_weight: 0.10
  absolute_scale_weight: 0.05
  novelty_weight: 0.05
  target_channel_count: 8.0
  capped_breakout_max: 8.0
  epsilon: 1.0e-6
  min_age_hours: 2.0

thresholds:
  breakout: 2.0
  strong_breakout: 4.0
  below_average: 0.75
  normal: 1.5
  above_average: 2.0
  rising_ratio: 1.25
  declining_ratio: 0.80
  reviving_ratio: 1.50
  standard_min_channels_72h: 3
  standard_breakout_ge_2_pct: 0.5
  early_min_channels_24h: 2
  early_min_videos_24h: 2
  dormant_hours_no_video: 72
  min_cluster_members: 2
  min_cluster_channels: 2

channels:
  priority_weight: 1.5
  general_weight: 1.0
  experimental_weight: 0.5

baselines:
  sample_size: 20
  confidence_high_min: 20
  confidence_medium_min: 10
  confidence_low_min: 5

snapshots:
  age_0_24h_interval_hours: 5
  age_1_3d_interval_hours: 10
  age_3_7d_interval_hours: 24
  lookback_days: 7
  retention_days: 90

momentum:
  recent_24h_multiplier: 25
  recent_72h_multiplier: 10
  persistence_channel_multiplier: 15
  absolute_scale_log_multiplier: 8

novelty:
  fresh_24h_score: 100
  fresh_72h_score: 70
  fresh_7d_score: 40
  fresh_default_score: 20
  fresh_24h_min_videos: 2
  fresh_72h_min_videos: 3

relative_breakout:
  median_weight: 0.6
  pct_ge_2_weight: 0.4
  pct_ge_2_scale: 100.0

lifecycle:
  new_max_age_hours: 24
  dormant_activity_threshold: 5.0

platforms:
  youtube:
    source_confidence: high
  tiktok:
    source_confidence: low

candidates:
  target_count: 30
  maximum_count: 40
  max_angles_per_trend: 4
  max_anime_share: 0.30
  min_new_trend_share: 0.20

relevance:
  allowed_language_prefixes: [en]
  unknown_language_policy: allow
  excluded_language_keywords: [hindi, "हिंदी"]
  excluded_topic_keywords: [manhwa, webtoon, manhua]
  generic_topic_keywords: [top 10 anime, best anime, every anime]
  excluded_score_multiplier: 0.0
  generic_score_multiplier: 0.25

# G3: bounded embedding recall + LLM gray-zone adjudication.
clustering:
  enabled: true
  max_publish_gap_days: 7
  recall_top_k: 5
  high_similarity: 0.88
  low_similarity: 0.72
  llm_min_confidence: 0.80
  embedding:
    provider: local_onnx  # local_onnx | remote_api | lexical
    embedding_space: "local-onnx:all-MiniLM-L6-v2@sha256:placeholder"
    model_name: "sentence-transformers/all-MiniLM-L6-v2"
    model_revision: "main"
    remote_base_url: ""
    remote_model: ""
    allow_lexical_fallback: true
    cache_enabled: true

# G4: public YouTube performance feedback loop (association only, not causal).
publication:
  team_channel_ids: []
  windows_hours: [0, 24, 72, 168]
  late_backfill_grace_hours: 6
  baseline_version: "publication-velocity-v1"
  max_consecutive_failures: 3
  retry_backoff_hours: 24
