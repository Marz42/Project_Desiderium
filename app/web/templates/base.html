<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Desiderium{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.addEventListener('htmx:configRequest', function(evt) {
      const token = document.body.dataset.csrf;
      if (token) evt.detail.headers['X-CSRF-Token'] = token;
    });
  </script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen" data-csrf="{{ csrf_token or '' }}">
  <header class="bg-slate-900 border-b border-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center gap-6 flex-wrap">
      <h1 class="text-lg font-semibold text-white">Desiderium</h1>
      <nav class="flex gap-4 text-sm">
        <a href="/candidates" class="{% if active_nav == 'candidates' %}text-blue-400{% else %}text-slate-400 hover:text-white{% endif %}">今日候选</a>
        <a href="/brief" class="{% if active_nav == 'brief' %}text-blue-400{% else %}text-slate-400 hover:text-white{% endif %}">简报预览</a>
        <a href="/history" class="{% if active_nav == 'history' %}text-blue-400{% else %}text-slate-400 hover:text-white{% endif %}">历史记录</a>
        <a href="/performance" class="{% if active_nav == 'performance' %}text-blue-400{% else %}text-slate-400 hover:text-white{% endif %}">表现回收</a>
        <a href="/watchlist" class="{% if active_nav == 'watchlist' %}text-blue-400{% else %}text-slate-400 hover:text-white{% endif %}">监控列表</a>
      </nav>
      <form method="post" action="/logout" class="ml-auto">
        <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}">
        <button type="submit" class="text-sm text-slate-400 hover:text-white">退出</button>
      </form>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% if flash_message %}
    <div class="mb-4 px-4 py-3 rounded-lg border {% if flash_type == 'error' %}bg-red-950 border-red-800 text-red-200{% else %}bg-emerald-950 border-emerald-800 text-emerald-200{% endif %}">
      {{ flash_message }}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
