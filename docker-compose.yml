services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: desiderium
      POSTGRES_PASSWORD: desiderium
      POSTGRES_DB: desiderium
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desiderium -d desiderium"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://desiderium:desiderium@postgres:5432/desiderium
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      SECRET_KEY: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://desiderium:desiderium@postgres:5432/desiderium
      LOG_LEVEL: INFO
      ENVIRONMENT: development
      SECRET_KEY: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.worker"

volumes:
  postgres_data:
